<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1B1036"/>
      <stop offset="1" stop-color="#0A0717"/>
    </linearGradient>
    <linearGradient id="plug" x1="40" y1="40" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#C13BFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="80" cy="80" r="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF6FD8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FF6FD8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="160" height="160" rx="36" fill="url(#bg)"/>

  <!-- spark glow behind the seam -->
  <circle cx="80" cy="80" r="40" fill="url(#glow)"/>

  <!-- left half: the agent core (socket) -->
  <path d="M30 56c0-7.7 6.3-14 14-14h28v76H44c-7.7 0-14-6.3-14-14V56z" fill="#2A1C52"/>
  <path d="M30 56c0-7.7 6.3-14 14-14h28v76H44c-7.7 0-14-6.3-14-14V56z" stroke="#5B47A8" stroke-width="2"/>
  <!-- socket holes -->
  <rect x="46" y="62" width="8" height="14" rx="3" fill="#0A0717"/>
  <rect x="46" y="84" width="8" height="14" rx="3" fill="#0A0717"/>

  <!-- right half: the plug-in module -->
  <path d="M88 42h28c7.7 0 14 6.3 14 14v48c0 7.7-6.3 14-14 14H88V42z" fill="url(#plug)"/>
  <!-- plug prongs reaching toward the core -->
  <rect x="72" y="64" width="18" height="9" rx="4" fill="#FFD7F2"/>
  <rect x="72" y="87" width="18" height="9" rx="4" fill="#FFD7F2"/>

  <!-- connection spark down the seam -->
  <path d="M80 36l-6 30h9l-7 28 18-34h-10l8-24z" fill="#FFE45E"/>
</svg>
